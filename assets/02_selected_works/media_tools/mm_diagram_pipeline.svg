<svg viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="media-mate run pipeline diagram">
  <style>
    .d-box { fill: none; stroke: var(--line-strong, rgba(74,73,68,0.4)); stroke-width: 1.5; }
    .d-soft { fill: var(--accent-soft, rgba(74,73,68,0.06)); stroke: var(--line-strong, rgba(74,73,68,0.4)); stroke-width: 1.5; }
    .d-title { font: 700 24px var(--font-ui, "IBM Plex Sans", sans-serif); fill: var(--ink-strong, #4a4944); letter-spacing: 0.1em; }
    .d-body { font: 400 21px var(--font-ui, "IBM Plex Sans", sans-serif); fill: var(--ink, #5c5b56); }
    .d-num { font: 700 46px var(--font-display, "Inter", sans-serif); fill: var(--muted, #94938d); opacity: 0.55; }
    .d-cap { font: 500 18px var(--font-ui, "IBM Plex Sans", sans-serif); fill: var(--muted, #94938d); letter-spacing: 0.16em; }
    .d-line { stroke: var(--accent, #4a4944); stroke-width: 1.5; fill: none; }
    .d-arrow { fill: var(--accent, #4a4944); }
  </style>
  <defs>
    <marker id="parr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="d-arrow"/>
    </marker>
  </defs>

  <!-- row 1 -->
  <rect x="60" y="60" width="340" height="210" class="d-box"/>
  <text x="376" y="116" text-anchor="end" class="d-num">01</text>
  <text x="84" y="114" class="d-title">PROBE</text>
  <text x="84" y="156" class="d-body">ffprobe json per file</text>
  <text x="84" y="188" class="d-body">codec · res · fps · color</text>
  <text x="84" y="220" class="d-body">audio · duration · size</text>

  <line x1="400" y1="165" x2="422" y2="165" class="d-line" marker-end="url(#parr)"/>

  <rect x="430" y="60" width="340" height="210" class="d-box"/>
  <text x="746" y="116" text-anchor="end" class="d-num">02</text>
  <text x="454" y="114" class="d-title">ORGANIZE</text>
  <text x="454" y="156" class="d-body">source tree preserved</text>
  <text x="454" y="188" class="d-body">copies by default · move opt-in</text>
  <text x="454" y="220" class="d-body">dry-run · conflict policy</text>

  <line x1="770" y1="165" x2="792" y2="165" class="d-line" marker-end="url(#parr)"/>

  <rect x="800" y="60" width="340" height="210" class="d-box"/>
  <text x="1116" y="116" text-anchor="end" class="d-num">03</text>
  <text x="824" y="114" class="d-title">PROXY</text>
  <text x="824" y="156" class="d-body">ProRes 422 Proxy · 1080p</text>
  <text x="824" y="188" class="d-body">timecode · color · PCM audio</text>
  <text x="824" y="220" class="d-body">SAR correction · CFR output</text>

  <!-- turn down -->
  <line x1="970" y1="270" x2="970" y2="342" class="d-line" marker-end="url(#parr)"/>

  <!-- row 2 (right to left) -->
  <rect x="800" y="350" width="340" height="210" class="d-box"/>
  <text x="1116" y="406" text-anchor="end" class="d-num">04</text>
  <text x="824" y="404" class="d-title">RESOLVE</text>
  <text x="824" y="446" class="d-body">bins mirror folders</text>
  <text x="824" y="478" class="d-body">timeline from clips</text>
  <text x="824" y="510" class="d-body">.drp or manifest.json</text>

  <line x1="800" y1="455" x2="778" y2="455" class="d-line" marker-end="url(#parr)"/>

  <rect x="430" y="350" width="340" height="210" class="d-box"/>
  <text x="746" y="406" text-anchor="end" class="d-num">05</text>
  <text x="454" y="404" class="d-title">VERIFY</text>
  <text x="454" y="446" class="d-body">xxhash 64 KB streaming</text>
  <text x="454" y="478" class="d-body">diff vs accepted baseline</text>
  <text x="454" y="510" class="d-body">mismatch persists until accepted</text>

  <line x1="430" y1="455" x2="408" y2="455" class="d-line" marker-end="url(#parr)"/>

  <rect x="60" y="350" width="340" height="210" class="d-soft"/>
  <text x="376" y="406" text-anchor="end" class="d-num">06</text>
  <text x="84" y="404" class="d-title">AUDIT</text>
  <text x="84" y="446" class="d-body">every step → SQLite row</text>
  <text x="84" y="478" class="d-body">runs · files · ops tables</text>
  <text x="84" y="510" class="d-body">queryable from the CLI</text>

  <text x="600" y="640" text-anchor="middle" class="d-cap">SAME INPUT → SAME OUTPUT → SAME LOG ROW · REPRODUCIBLE BY DESIGN</text>
</svg>
