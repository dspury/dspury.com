<svg viewBox="0 0 1200 940" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="How the work flows: direction on the laptop, rendering routed to a headless GPU workstation running custom ComfyUI graphs">
  <style>
    .d-box { fill: none; stroke: var(--line-strong, rgba(74,73,68,0.4)); stroke-width: 1.5; }
    .d-soft { fill: var(--accent-soft, rgba(74,73,68,0.06)); stroke: var(--line-strong, rgba(74,73,68,0.4)); stroke-width: 1.5; }
    .d-title { font: 700 24px var(--font-ui, "IBM Plex Sans", sans-serif); fill: var(--ink-strong, #4a4944); letter-spacing: 0.1em; }
    .d-body { font: 400 21px var(--font-ui, "IBM Plex Sans", sans-serif); fill: var(--ink, #5c5b56); }
    .d-num { font: 700 46px var(--font-display, "Inter", sans-serif); fill: var(--muted, #94938d); opacity: 0.55; }
    .d-cap { font: 500 18px var(--font-ui, "IBM Plex Sans", sans-serif); fill: var(--muted, #94938d); letter-spacing: 0.16em; }
    .d-line { stroke: var(--accent, #4a4944); stroke-width: 1.5; fill: none; }
    .d-dash { stroke: var(--line-strong, rgba(74,73,68,0.4)); stroke-width: 1.5; fill: none; stroke-dasharray: 7 7; }
    .d-arrow { fill: var(--accent, #4a4944); }
  </style>
  <defs>
    <marker id="lparr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="d-arrow"/>
    </marker>
  </defs>

  <!-- top lane: local -->
  <text x="60" y="52" class="d-cap">LAPTOP — DIRECT &amp; REVIEW</text>

  <rect x="60" y="80" width="340" height="200" class="d-box"/>
  <text x="376" y="136" text-anchor="end" class="d-num">01</text>
  <text x="84" y="134" class="d-title">WRITE</text>
  <text x="84" y="176" class="d-body">style bible + shot brief</text>
  <text x="84" y="208" class="d-body">cineprompt assembles the prompt</text>
  <text x="84" y="240" class="d-body">same look, every shot</text>

  <rect x="800" y="80" width="340" height="200" class="d-box"/>
  <text x="1116" y="136" text-anchor="end" class="d-num">05</text>
  <text x="824" y="134" class="d-title">SELECT</text>
  <text x="824" y="176" class="d-body">review renders · keep or kill</text>
  <text x="824" y="208" class="d-body">keepers retimed for the edit</text>
  <text x="824" y="240" class="d-body">notes feed the next batch</text>

  <!-- down: submit -->
  <line x1="230" y1="280" x2="230" y2="522" class="d-line" marker-end="url(#lparr)"/>
  <text x="252" y="356" class="d-body">prompt becomes a graph (JSON)</text>
  <text x="252" y="388" class="d-body">posted to the ComfyUI API</text>

  <!-- up: return -->
  <line x1="970" y1="545" x2="970" y2="288" class="d-line" marker-end="url(#lparr)"/>
  <text x="948" y="356" text-anchor="end" class="d-body">finished renders sync back</text>

  <!-- machine boundary -->
  <line x1="60" y1="452" x2="205" y2="452" class="d-dash"/>
  <line x1="255" y1="452" x2="945" y2="452" class="d-dash"/>
  <line x1="995" y1="452" x2="1140" y2="452" class="d-dash"/>
  <text x="600" y="440" text-anchor="middle" class="d-cap">MACHINE BOUNDARY — HTTP API OVER TAILSCALE · THE BOX RUNS HEADLESS</text>

  <!-- bottom lane: remote -->
  <text x="60" y="522" class="d-cap">GPU WORKSTATION — RENDER SERVICE</text>

  <rect x="60" y="545" width="340" height="200" class="d-box"/>
  <text x="376" y="601" text-anchor="end" class="d-num">02</text>
  <text x="84" y="599" class="d-title">QUEUE</text>
  <text x="84" y="641" class="d-body">service wakes on demand</text>
  <text x="84" y="673" class="d-body">jobs run unattended, overnight</text>
  <text x="84" y="705" class="d-body">stops itself when idle</text>

  <line x1="400" y1="645" x2="422" y2="645" class="d-line" marker-end="url(#lparr)"/>

  <rect x="430" y="545" width="340" height="200" class="d-soft"/>
  <text x="746" y="601" text-anchor="end" class="d-num">03</text>
  <text x="454" y="599" class="d-title">CUSTOM GRAPHS</text>
  <text x="454" y="641" class="d-body">one ComfyUI graph per job:</text>
  <text x="454" y="673" class="d-body">stills · video · 3D mesh · music</text>
  <text x="454" y="705" class="d-body">models + settings locked per graph</text>

  <line x1="770" y1="645" x2="792" y2="645" class="d-line" marker-end="url(#lparr)"/>

  <rect x="800" y="545" width="340" height="200" class="d-box"/>
  <text x="1116" y="601" text-anchor="end" class="d-num">04</text>
  <text x="824" y="599" class="d-title">OUTPUTS</text>
  <text x="824" y="641" class="d-body">every render embeds the full</text>
  <text x="824" y="673" class="d-body">graph that made it — any frame</text>
  <text x="824" y="705" class="d-body">can be reproduced exactly</text>

  <text x="600" y="880" text-anchor="middle" class="d-cap">DIRECTION STAYS LOCAL · RENDER IS A SERVICE · EVERY FRAME CARRIES ITS OWN RECIPE</text>
</svg>
