<svg viewBox="0 0 1100 1400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ComfyUI TouchDesigner system architecture diagram">
  <style>
    .d-box { fill: none; stroke: var(--line-strong, rgba(74,73,68,0.4)); stroke-width: 1.5; }
    .d-soft { fill: var(--accent-soft, rgba(74,73,68,0.06)); stroke: var(--line-strong, rgba(74,73,68,0.4)); stroke-width: 1.5; }
    .d-dash { fill: none; stroke: var(--line-strong, rgba(74,73,68,0.4)); stroke-width: 1.5; stroke-dasharray: 7 7; }
    .d-title { font: 700 25px var(--font-ui, "IBM Plex Sans", sans-serif); fill: var(--ink-strong, #4a4944); letter-spacing: 0.1em; }
    .d-body { font: 400 21px var(--font-ui, "IBM Plex Sans", sans-serif); fill: var(--ink, #5c5b56); }
    .d-mut { font: 500 18px var(--font-ui, "IBM Plex Sans", sans-serif); fill: var(--muted, #94938d); letter-spacing: 0.13em; }
    .d-cap { font: 500 18px var(--font-ui, "IBM Plex Sans", sans-serif); fill: var(--muted, #94938d); letter-spacing: 0.16em; }
    .d-line { stroke: var(--accent, #4a4944); stroke-width: 1.5; fill: none; }
    .d-arrow { fill: var(--accent, #4a4944); }
  </style>
  <defs>
    <marker id="aarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="d-arrow"/>
    </marker>
  </defs>

  <!-- Control plane -->
  <rect x="60" y="50" width="455" height="180" class="d-box"/>
  <text x="84" y="92" class="d-title">LAPTOP · CONTROL</text>
  <text x="84" y="130" class="d-body">queue workflows · pull renders</text>
  <text x="84" y="162" class="d-body">ssh over tailscale</text>

  <rect x="585" y="50" width="455" height="180" class="d-box"/>
  <text x="609" y="92" class="d-title">AGENTS</text>
  <text x="609" y="130" class="d-body">drive TD + ComfyUI remotely</text>
  <text x="609" y="162" class="d-body">same two APIs as the human</text>

  <line x1="287" y1="230" x2="287" y2="308" class="d-line" marker-end="url(#aarr)"/>
  <text x="309" y="280" class="d-mut">HTTP :8188 · /prompt · /history</text>
  <line x1="812" y1="230" x2="812" y2="308" class="d-line" marker-end="url(#aarr)"/>
  <text x="834" y="280" class="d-mut">HTTP · POST PYTHON</text>

  <!-- Titus workstation -->
  <rect x="50" y="310" width="1000" height="880" class="d-dash"/>
  <text x="76" y="352" class="d-mut">TITUS — GPU WORKSTATION · RTX 4070 Ti 12GB · 96GB RAM · KUBUNTU</text>

  <!-- ComfyUI -->
  <rect x="80" y="380" width="455" height="360" class="d-box"/>
  <text x="104" y="422" class="d-title">COMFYUI</text>
  <text x="104" y="460" class="d-body">systemd service · :8188</text>
  <text x="104" y="492" class="d-body">idle controller · 20 min timeout</text>
  <text x="104" y="524" class="d-body">Flux2 Klein · image</text>
  <text x="104" y="556" class="d-body">TRELLIS 2.0 · image → 3D</text>
  <text x="104" y="588" class="d-body">MusicGen · audio</text>
  <text x="104" y="620" class="d-body">LTX-Video · Wan 2.2 · video lab</text>
  <text x="104" y="652" class="d-body">workflows saved as API json</text>

  <!-- TouchDesigner -->
  <rect x="585" y="380" width="455" height="360" class="d-box"/>
  <text x="609" y="422" class="d-title">TOUCHDESIGNER</text>
  <text x="609" y="460" class="d-body">audio-reactive network (.toe)</text>
  <text x="609" y="492" class="d-body">File In SOP · generated mesh</text>
  <text x="609" y="524" class="d-body">Audio Spectrum + Analyze CHOPs</text>
  <text x="609" y="556" class="d-body">Math · Lag CHOPs → parameters</text>
  <text x="609" y="588" class="d-body">Render TOP → movie out</text>

  <!-- Web Server DAT bridge (inside TD box, highlighted) -->
  <rect x="609" y="620" width="407" height="96" class="d-soft"/>
  <text x="633" y="656" class="d-title">WEB SERVER DAT</text>
  <text x="633" y="688" class="d-body">exec(posted python) → json reply</text>

  <!-- Blender -->
  <rect x="80" y="790" width="455" height="150" class="d-box"/>
  <text x="104" y="832" class="d-title">BLENDER · HEADLESS</text>
  <text x="104" y="870" class="d-body">bpy: glb → triangulated obj</text>
  <text x="104" y="902" class="d-body">normals · uvs preserved</text>

  <!-- asset flow arrows -->
  <line x1="307" y1="740" x2="307" y2="782" class="d-line" marker-end="url(#aarr)"/>
  <text x="329" y="770" class="d-mut">GLB</text>
  <line x1="535" y1="865" x2="700" y2="865" class="d-line" marker-end="url(#aarr)"/>
  <line x1="700" y1="865" x2="700" y2="748" class="d-line" marker-end="url(#aarr)"/>
  <text x="560" y="845" class="d-mut">OBJ → FILE IN SOP</text>

  <!-- audio arrow ComfyUI -> TD -->
  <line x1="535" y1="590" x2="577" y2="590" class="d-line" marker-end="url(#aarr)"/>
  <text x="380" y="770" class="d-mut" opacity="0"></text>

  <!-- storage -->
  <rect x="80" y="990" width="960" height="150" class="d-box"/>
  <text x="104" y="1032" class="d-title">SHARED DISK · /mnt/work</text>
  <text x="104" y="1070" class="d-body">ComfyUI output/ → comfyui-td/assets/ → TD project · models ~29 GB on disk</text>
  <text x="104" y="1102" class="d-body">everything local · zero cloud spend</text>

  <line x1="307" y1="940" x2="307" y2="982" class="d-line" marker-end="url(#aarr)"/>
  <line x1="812" y1="716" x2="812" y2="982" class="d-line" marker-end="url(#aarr)"/>

  <!-- caption -->
  <text x="550" y="1300" text-anchor="middle" class="d-cap">TWO REMOTE-CONTROL SURFACES: COMFYUI'S HTTP API + A PYTHON BRIDGE INTO LIVE TOUCHDESIGNER</text>
</svg>
