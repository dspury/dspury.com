<svg viewBox="0 0 1200 1070" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ComfyUI to TouchDesigner generative pipeline diagram">
  <style>
    .d-box { fill: none; stroke: var(--line-strong, rgba(74,73,68,0.4)); stroke-width: 1.5; }
    .d-soft { fill: var(--accent-soft, rgba(74,73,68,0.06)); stroke: var(--line-strong, rgba(74,73,68,0.4)); stroke-width: 1.5; }
    .d-title { font: 700 24px var(--font-ui, "IBM Plex Sans", sans-serif); fill: var(--ink-strong, #4a4944); letter-spacing: 0.1em; }
    .d-body { font: 400 21px var(--font-ui, "IBM Plex Sans", sans-serif); fill: var(--ink, #5c5b56); }
    .d-num { font: 700 46px var(--font-display, "Inter", sans-serif); fill: var(--muted, #94938d); opacity: 0.55; }
    .d-cap { font: 500 18px var(--font-ui, "IBM Plex Sans", sans-serif); fill: var(--muted, #94938d); letter-spacing: 0.16em; }
    .d-line { stroke: var(--accent, #4a4944); stroke-width: 1.5; fill: none; }
    .d-arrow { fill: var(--accent, #4a4944); }
  </style>
  <defs>
    <marker id="carr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="d-arrow"/>
    </marker>
  </defs>

  <!-- row 1 -->
  <rect x="60" y="60" width="340" height="210" class="d-box"/>
  <text x="376" y="116" text-anchor="end" class="d-num">01</text>
  <text x="84" y="114" class="d-title">IMAGE</text>
  <text x="84" y="156" class="d-body">Flux2 Klein · ComfyUI</text>
  <text x="84" y="188" class="d-body">prompt → hero object</text>
  <text x="84" y="220" class="d-body">carved fox sculpture</text>

  <line x1="400" y1="165" x2="422" y2="165" class="d-line" marker-end="url(#carr)"/>

  <rect x="430" y="60" width="340" height="210" class="d-box"/>
  <text x="746" y="116" text-anchor="end" class="d-num">02</text>
  <text x="454" y="114" class="d-title">IMAGE → 3D</text>
  <text x="454" y="156" class="d-body">TRELLIS 2.0 · 4B params</text>
  <text x="454" y="188" class="d-body">single image → full mesh</text>
  <text x="454" y="220" class="d-body">.glb with PBR materials</text>

  <line x1="770" y1="165" x2="792" y2="165" class="d-line" marker-end="url(#carr)"/>

  <rect x="800" y="60" width="340" height="210" class="d-box"/>
  <text x="1116" y="116" text-anchor="end" class="d-num">03</text>
  <text x="824" y="114" class="d-title">CONVERT</text>
  <text x="824" y="156" class="d-body">Blender headless (bpy)</text>
  <text x="824" y="188" class="d-body">glb → triangulated obj</text>
  <text x="824" y="220" class="d-body">TD-ready geometry</text>

  <!-- turn down -->
  <line x1="970" y1="270" x2="970" y2="342" class="d-line" marker-end="url(#carr)"/>

  <!-- row 2 (right to left) -->
  <rect x="800" y="350" width="340" height="210" class="d-box"/>
  <text x="1116" y="406" text-anchor="end" class="d-num">04</text>
  <text x="824" y="404" class="d-title">AUDIO</text>
  <text x="824" y="446" class="d-body">MusicGen · ComfyUI</text>
  <text x="824" y="478" class="d-body">generated soundtrack</text>
  <text x="824" y="510" class="d-body">the music is synthetic too</text>

  <line x1="800" y1="455" x2="778" y2="455" class="d-line" marker-end="url(#carr)"/>

  <rect x="430" y="350" width="340" height="210" class="d-soft"/>
  <text x="746" y="406" text-anchor="end" class="d-num">05</text>
  <text x="454" y="404" class="d-title">REACT</text>
  <text x="454" y="446" class="d-body">TouchDesigner · File In SOP</text>
  <text x="454" y="478" class="d-body">Audio Spectrum CHOP · FFT</text>
  <text x="454" y="510" class="d-body">bands → scale · displace · glow</text>

  <line x1="430" y1="455" x2="408" y2="455" class="d-line" marker-end="url(#carr)"/>

  <rect x="60" y="350" width="340" height="210" class="d-box"/>
  <text x="376" y="406" text-anchor="end" class="d-num">06</text>
  <text x="84" y="404" class="d-title">RENDER</text>
  <text x="84" y="446" class="d-body">Geometry + Camera + Light</text>
  <text x="84" y="478" class="d-body">Render TOP · post fx</text>
  <text x="84" y="510" class="d-body">movie out · stills</text>

  <!-- frequency band strip -->
  <rect x="60" y="640" width="1080" height="270" class="d-box"/>
  <text x="86" y="682" class="d-cap">FREQUENCY BANDS → VISUAL PARAMETERS</text>
  <text x="86" y="726" class="d-body">bass 20–150 Hz → scale · pulse</text>
  <text x="86" y="758" class="d-body">low-mid 150–500 Hz → rotation · position</text>
  <text x="86" y="790" class="d-body">mid 500–2k Hz → particle emission</text>
  <text x="620" y="726" class="d-body">high-mid 2k–6k Hz → glow · texture detail</text>
  <text x="620" y="758" class="d-body">treble 6k–20k Hz → sparkle · edge highlights</text>
  <text x="620" y="790" class="d-body">beat trigger → timer-driven pulses</text>
  <text x="86" y="862" class="d-body">Lag CHOP smoothing everywhere — raw FFT is too jittery to drive visuals directly</text>

  <text x="600" y="1010" text-anchor="middle" class="d-cap">EVERY ASSET IN THE CHAIN IS GENERATED — IMAGE, MESH, AND MUSIC</text>
</svg>
