<svg viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="virtual fashion garment pipeline diagram">
  <style>
    .d-box { fill: none; stroke: var(--line-strong, rgba(74,73,68,0.4)); stroke-width: 1.5; }
    .d-soft { fill: var(--accent-soft, rgba(74,73,68,0.06)); stroke: var(--line-strong, rgba(74,73,68,0.4)); stroke-width: 1.5; }
    .d-title { font: 700 24px var(--font-ui, "IBM Plex Sans", sans-serif); fill: var(--ink-strong, #4a4944); letter-spacing: 0.1em; }
    .d-body { font: 400 21px var(--font-ui, "IBM Plex Sans", sans-serif); fill: var(--ink, #5c5b56); }
    .d-num { font: 700 46px var(--font-display, "Inter", sans-serif); fill: var(--muted, #94938d); opacity: 0.55; }
    .d-cap { font: 500 18px var(--font-ui, "IBM Plex Sans", sans-serif); fill: var(--muted, #94938d); letter-spacing: 0.16em; }
    .d-line { stroke: var(--accent, #4a4944); stroke-width: 1.5; fill: none; }
    .d-arrow { fill: var(--accent, #4a4944); }
  </style>
  <defs>
    <marker id="varr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="d-arrow"/>
    </marker>
  </defs>

  <!-- row 1 -->
  <rect x="60" y="60" width="510" height="210" class="d-box"/>
  <text x="546" y="116" text-anchor="end" class="d-num">01</text>
  <text x="84" y="114" class="d-title">MARVELOUS DESIGNER</text>
  <text x="84" y="156" class="d-body">garments patterned from flat panels</text>
  <text x="84" y="188" class="d-body">fit on custom avatars</text>
  <text x="84" y="220" class="d-body">cloth simulated — drape · pinch · gather</text>

  <line x1="570" y1="165" x2="622" y2="165" class="d-line" marker-end="url(#varr)"/>

  <rect x="630" y="60" width="510" height="210" class="d-box"/>
  <text x="1116" y="116" text-anchor="end" class="d-num">02</text>
  <text x="654" y="114" class="d-title">EXPORT</text>
  <text x="654" y="156" class="d-body">sim caches over Alembic</text>
  <text x="654" y="188" class="d-body">garment meshes with UDIM texture sets</text>
  <text x="654" y="220" class="d-body">diffuse · normal · roughness · displacement</text>

  <!-- turn down -->
  <line x1="885" y1="270" x2="885" y2="322" class="d-line" marker-end="url(#varr)"/>

  <!-- row 2 (right to left) -->
  <rect x="630" y="330" width="510" height="210" class="d-box"/>
  <text x="1116" y="386" text-anchor="end" class="d-num">03</text>
  <text x="654" y="384" class="d-title">BLENDER</text>
  <text x="654" y="426" class="d-body">set design · fur + hair grooming</text>
  <text x="654" y="458" class="d-body">studio lighting · Cycles</text>
  <text x="654" y="490" class="d-body">clay pass for every look</text>

  <line x1="630" y1="435" x2="578" y2="435" class="d-line" marker-end="url(#varr)"/>

  <rect x="60" y="330" width="510" height="210" class="d-soft"/>
  <text x="546" y="386" text-anchor="end" class="d-num">04</text>
  <text x="84" y="384" class="d-title">FINISH</text>
  <text x="84" y="426" class="d-body">graded and retouched in Photoshop</text>
  <text x="84" y="458" class="d-body">from reusable studio edit templates</text>
  <text x="84" y="490" class="d-body">3000 × 3750 editorial masters</text>
</svg>
